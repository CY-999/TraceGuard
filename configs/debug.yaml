debug:
  enabled: true

dataset:
  name: fakedata
  data_dir: data
  download: false
  fake_data_on_missing: true
  num_workers: 0
  batch_size: 32
  test_batch_size: 128
  max_train_samples: 64
  max_test_samples: 64

federated:
  num_clients: 5
  clients_per_round: 3

training:
  rounds: 1
  local_epochs: 1
  lr: 0.01
  seed: 123

attack:
  name: none
  num_malicious: 0
  target_label: 0
  poison_ratio: 0.1
  trigger_type: patch
  scale_factor: 1.0
  fragment_layout: four_corners
  trigger_size: 4
  trigger_value: 1.0
  mask_ratio: 0.2
  history_window: 5
  adaptive_steps: 5
  trigger_alpha: 0.2
  trigger_lr: 0.05
  dynamics_perturb_steps: 1

defense:
  name: fedavg
  num_byzantine: null
  num_selected: null
  trim_ratio: null
  clip_norm: null
  noise_std: 0.0
  cluster_method: agglomerative
  cluster_metric: cosine
  reverse_steps: 5
  reverse_lr: 0.05
  trigger_size: 4
  trigger_alpha: 0.2
  target_label: 0
  hardening_ratio: 0.5
