project:
  name: TRACEGuard
  output_dir: outputs/debug

dataset:
  name: cifar10
  data_dir: data
  download: false
  num_workers: 2
  batch_size: 32
  test_batch_size: 128
  max_train_samples: null
  max_test_samples: null

partition:
  type: iid
  alpha: 0.5

federated:
  num_clients: 10
  clients_per_round: 5

training:
  rounds: 10
  local_epochs: 1
  lr: 0.01
  momentum: 0.9
  seed: 42

model:
  name: simple_cnn
  num_classes: 10

attack:
  name: none
  num_malicious: 0
  target_label: 0
  poison_ratio: 0.1
  trigger_type: patch
  scale_factor: 1.0
  fragment_layout: four_corners
  trigger_size: 4
  trigger_value: 1.0
  mask_ratio: 0.2
  history_window: 5
  adaptive_steps: 20
  trigger_alpha: 0.2
  trigger_lr: 0.05
  dynamics_perturb_steps: 1

defense:
  name: fedavg
  num_byzantine: null
  num_selected: null

debug:
  enabled: false
