project:
  name: TRACEGuard
  output_dir: outputs/debug

dataset:
  name: cifar10
  data_dir: data
  download: false
  num_workers: 2
  batch_size: 32
  test_batch_size: 128
  max_train_samples: null
  max_test_samples: null

partition:
  type: iid
  alpha: 0.5

federated:
  num_clients: 10
  clients_per_round: 5

training:
  rounds: 10
  local_epochs: 1
  lr: 0.01
  momentum: 0.9
  seed: 42

model:
  name: simple_cnn
  num_classes: 10

attack:
  name: none

defense:
  name: fedavg

debug:
  enabled: false
