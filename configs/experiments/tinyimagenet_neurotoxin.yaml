dataset:
  name: tinyimagenet
  download: false
  batch_size: 64
  test_batch_size: 256

partition:
  type: dirichlet
  alpha: 0.5

federated:
  num_clients: 100
  clients_per_round: 10

training:
  rounds: 300
  local_epochs: 2
  lr: 0.01
  momentum: 0.9
  seed: 123

model:
  name: resnet18_tiny
  num_classes: 200

attack:
  name: neurotoxin
  num_malicious: 10
  target_label: 0
  poison_ratio: 0.5
  mask_ratio: 0.2
  history_window: 5
  trigger_type: patch
  trigger_size: 4
  trigger_value: 1.0
  trigger_alpha: 0.2
  trigger_location: bottom_right
  attack_start_round: 1
  attack_stop_round: 150
  attack_interval: 1

defense:
  name: asaguard

multi_krum:
  num_byzantine: 2
  num_selected: null

trimmed_mean:
  num_byzantine: 2
  trim_ratio: null


asaguard:
  num_probes: 64
  probe_families:
    - patch
    - blend_low_alpha
    - frequency_sine
    - warping
  subspace_rank: 4
  eps: 1.0e-12
  adaptive_steps: 5
