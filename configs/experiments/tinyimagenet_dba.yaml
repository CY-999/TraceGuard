dataset:
  name: tinyimagenet
  download: false
  batch_size: 64
  test_batch_size: 256

partition:
  type: dirichlet
  alpha: 0.5

federated:
  num_clients: 100
  clients_per_round: 10

training:
  rounds: 300
  local_epochs: 2
  lr: 0.01
  momentum: 0.9
  seed: 123

model:
  name: resnet18_tiny
  num_classes: 200

attack:
  name: dba
  num_malicious: 10
  target_label: 0
  poison_ratio: 0.5

dba:
  num_fragments: 4
  trigger_size: 10
  trigger_gap: 2
  trigger_location: 0
  fragment_rows: 2
  trigger_value: 1.0

defense:
  name: asaguard

multi_krum:
  num_byzantine: 2
  num_selected: null

trimmed_mean:
  num_byzantine: 2
  trim_ratio: null


asaguard:
  num_probes: 64
  probe_families:
    - patch
    - blend_low_alpha
    - frequency_sine
    - warping
  subspace_rank: 4
  eps: 1.0e-12
  adaptive_steps: 5
