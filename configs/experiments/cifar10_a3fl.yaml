dataset:
  name: cifar10
  download: false
  batch_size: 64
  test_batch_size: 256

partition:
  type: dirichlet
  alpha: 0.5

federated:
  num_clients: 100
  clients_per_round: 10

training:
  rounds: 200
  local_epochs: 2
  lr: 0.01
  momentum: 0.9
  seed: 123

model:
  name: resnet18_cifar
  num_classes: 10

attack:
  name: a3fl
  num_malicious: 10
  target_label: 0
  poison_ratio: 0.5
  trigger_size: 4
  trigger_alpha: 0.2
  trigger_location: bottom_right
  trigger_lr: 0.05
  outer_steps: 20
  trigger_steps: 1
  adv_model_lr: 0.01
  lambda0: 1.0
  adv_model_steps: 1

defense:
  name: asaguard

multi_krum:
  num_byzantine: 2
  num_selected: null

trimmed_mean:
  num_byzantine: 2
  trim_ratio: null


asaguard:
  num_probes: 64
  probe_families:
    - patch
    - blend_low_alpha
    - frequency_sine
    - warping
  subspace_rank: 4
  eps: 1.0e-12
  adaptive_steps: 5
