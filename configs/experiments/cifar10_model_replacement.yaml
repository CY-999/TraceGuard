dataset:
  name: cifar10
  download: false
  batch_size: 64
  test_batch_size: 256

partition:
  type: dirichlet
  alpha: 0.5

federated:
  num_clients: 100
  clients_per_round: 10

training:
  rounds: 200
  local_epochs: 2
  lr: 0.01
  momentum: 0.9
  seed: 123

model:
  name: resnet18_cifar
  num_classes: 10

attack:
  name: model_replacement
  num_malicious: 10
  target_label: 0
  poison_ratio: 0.5

defense:
  name: traceguard
  num_byzantine: 2
  trim_ratio: null

traceguard:
  num_probes: 64
  probe_families:
    - patch
    - blend_low_alpha
    - frequency_sine
    - warping
  tau: 4.0
  reference_per_class: 5
  adaptive_steps: 5
